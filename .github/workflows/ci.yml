name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  test-and-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax check
        env:
          PYTHONPYCACHEPREFIX: .pycache_ci
        run: |
          python -m py_compile $(git ls-files '*.py')

      - name: Observability smoke check
        env:
          PHOENIX_ENABLED: "true"
          PHOENIX_PROJECT_NAME: "fifa-world-cup-chatbot-ci"
          PHOENIX_COLLECTOR_ENDPOINT: "http://127.0.0.1:6006/v1/traces"
        run: |
          python - <<'PY'
          import logging
          from crew.observability import init_observability

          obs = init_observability()
          with obs.span("ci.observability_smoke", {"ci": True}):
              pass
          obs.log_event(
              logging.getLogger("ci"),
              "ci_observability_smoke_ok",
              component="ci",
              source="github_actions",
          )
          print("observability smoke ok")
          PY

      - name: Run tests
        run: pytest -q
